{{ define "main" }}
<div class="py-16 space-y-10 animate-fade-in max-w-4xl mx-auto">
  <section class="space-y-4 text-center">
    <h1 class="text-4xl font-bold tracking-tight text-foreground">All Tags</h1>
    <p class="text-muted-foreground">
      Explore all topics covered across the site.
    </p>
  </section>

  <div class="flex flex-wrap gap-3 justify-center pt-8">
    {{ range $name, $taxonomy := .Data.Terms }}
    <a
      href="{{ "/tags/" | relLangURL }}{{ $name | urlize }}"
      class="inline-flex items-center gap-2 px-5 py-2.5 rounded-full border border-border/60 bg-card/60 hover:bg-card hover:border-amber-500/50 text-foreground transition-all duration-300 shadow-sm"
    >
      <span class="font-medium">{{ $name }}</span>
      <span class="text-xs bg-muted text-muted-foreground px-2 py-0.5 rounded-full font-mono">
        {{ len $taxonomy.Pages }}
      </span>
    </a>
    {{ end }}
  </div>
</div>
{{ end }}

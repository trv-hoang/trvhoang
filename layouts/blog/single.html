{{ define "main" }}
<div class="py-16 animate-fade-in max-w-6xl mx-auto flex flex-col lg:flex-row gap-12 items-start">
  
  <!-- Main Article -->
  <article class="flex-1 min-w-0 space-y-8 w-full max-w-3xl">
    
    <!-- Back Navigation -->
    <a href="/blog/" class="inline-flex items-center gap-2 text-sm text-muted-foreground hover:text-foreground transition-colors group">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 transition-transform group-hover:-translate-x-1"><path d="m15 18-6-6 6-6"/></svg>
      Back to Blog
    </a>

    <!-- Post Header & Cover Image -->
    {{ partial "blog/post-header.html" . }}

    <!-- Content -->
    <div class="prose prose-zinc dark:prose-invert prose-p:text-muted-foreground prose-headings:text-foreground prose-a:text-amber-500 hover:prose-a:text-amber-400 max-w-none mt-10">
      {{ .Content }}
    </div>

    <!-- Comments -->
    {{ partial "comments.html" . }}

  </article>

  <!-- Sidebar (Sidetab) -->
  <aside class="hidden lg:flex w-64 flex-shrink-0 sticky top-28 flex-col gap-8 border-l border-border/60 pl-8">
    
    <!-- Table of Contents -->
    <div class="space-y-4">
      <h3 class="font-semibold text-foreground text-sm uppercase tracking-wider">On this page</h3>
      <div class="text-sm text-muted-foreground prose prose-zinc dark:prose-invert prose-a:text-muted-foreground hover:prose-a:text-foreground prose-a:no-underline prose-ul:pl-4 prose-ul:space-y-2 prose-li:marker:text-border">
        {{ .TableOfContents }}
      </div>
    </div>
    
  </aside>

</div>
{{ end }}

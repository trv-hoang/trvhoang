<!-- Giscus Comments Component -->
<div class="mt-16 pt-8 border-t border-border/60 animate-fade-in">
  <h3 class="text-xl font-bold text-foreground mb-6">Comments</h3>

  <div class="giscus"></div>
  <script src="https://giscus.app/client.js"
        data-repo="trv-hoang/trvhoang"
        data-repo-id="R_kgDORiOWiw"
        data-category="Comments"
        data-category-id="DIC_kwDORiOWi84C4Bon"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="top"
        data-theme="dark"
        data-lang="en"
        data-loading="lazy"
        crossorigin="anonymous"
        async>
  </script>
</div>

<script>
  (function () {
    function giscusTheme() {
      return document.documentElement.classList.contains('dark') ? 'dark' : 'light';
    }
    function sendTheme(theme) {
      const iframe = document.querySelector('iframe.giscus-frame');
      if (!iframe) return;
      iframe.contentWindow.postMessage({ giscus: { setConfig: { theme } } }, 'https://giscus.app');
    }
    // Sync on toggle
    new MutationObserver(() => sendTheme(giscusTheme()))
      .observe(document.documentElement, { attributeFilter: ['class'] });
    // Set initial theme after giscus iframe loads
    window.addEventListener('message', function handler(e) {
      if (e.origin !== 'https://giscus.app') return;
      if (e.data?.giscus?.discussion !== undefined || e.data?.giscus) {
        sendTheme(giscusTheme());
        window.removeEventListener('message', handler);
      }
    });
  })();
</script>

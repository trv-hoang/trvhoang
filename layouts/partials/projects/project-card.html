<a href="{{ .RelPermalink }}" class="group flex flex-col border border-border/60 rounded-xl bg-card/40 hover:bg-card/80 hover:border-border transition-all duration-200 p-5">
  <div class="pb-2 flex items-start justify-between gap-2">
    <h2 class="font-semibold text-foreground group-hover:text-amber-400 transition-colors leading-tight">
      {{ .Params.title }}
    </h2>
    <div class="flex items-center gap-2">
      <span class="text-xs px-2 py-0.5 rounded-full border flex-shrink-0
        {{ if eq .Params.status "Live" }}bg-green-500/10 text-green-400 border-green-500/20
        {{ else if eq .Params.status "Completed" }}bg-blue-500/10 text-blue-400 border-blue-500/20
        {{ else if eq .Params.status "In Progress" }}bg-amber-500/10 text-amber-400 border-amber-500/20
        {{ else }}bg-muted text-muted-foreground border-border/40{{ end }}">
        {{ .Params.status }}
      </span>
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 text-muted-foreground opacity-0 -translate-x-2 transition-all duration-200 group-hover:opacity-100 group-hover:translate-x-0 group-hover:text-amber-400 flex-shrink-0"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
    </div>
  </div>
  <div class="flex-1 pb-3 mt-1">
    <p class="text-sm text-muted-foreground leading-relaxed line-clamp-2">
      {{ .Params.description }}
    </p>
  </div>
  <div class="flex items-center justify-between pt-2 flex-wrap gap-3 border-t border-border/50 mt-auto">
    <div class="flex flex-wrap gap-1.5 mt-2">
      {{ range .Params.tags }}
      <span class="inline-flex items-center rounded-md bg-muted px-2 py-1 text-xs font-medium text-muted-foreground ring-1 ring-inset ring-border/40">
        {{ . }}
      </span>
      {{ end }}
    </div>
    <div class="flex gap-2 mt-2">
      {{ if .Params.teamSize }}
      <span class="flex items-center gap-1 text-xs text-muted-foreground">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3.5 h-3.5"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        {{ .Params.teamSize }}
      </span>
      {{ end }}
    </div>
  </div>
</a>

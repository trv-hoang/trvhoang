<div class="group flex flex-col border border-border/60 rounded-xl bg-card/40 hover:bg-card/80 hover:border-border transition-all duration-200 p-5">
  <div class="pb-2 flex items-start justify-between gap-2">
    <h2 class="font-semibold text-foreground group-hover:text-amber-400 transition-colors leading-tight">
      {{ .Params.title }}
    </h2>
    <span class="text-xs px-2 py-0.5 rounded-full border flex-shrink-0 
      {{ if eq .Params.status "Live" }}bg-green-500/10 text-green-400 border-green-500/20
      {{ else if eq .Params.status "In Progress" }}bg-amber-500/10 text-amber-400 border-amber-500/20
      {{ else }}bg-muted text-muted-foreground border-border/40{{ end }}">
      {{ .Params.status }}
    </span>
  </div>
  <div class="flex-1 pb-3 mt-1">
    <p class="text-sm text-muted-foreground leading-relaxed">
      {{ .Params.description }}
    </p>
  </div>
  <div class="flex items-center justify-between pt-2 flex-wrap gap-3 border-t border-border/50 mt-auto">
    <div class="flex flex-wrap gap-1.5 mt-2">
      {{ range .Params.tags }}
      <span class="inline-flex items-center rounded-md bg-muted px-2 py-1 text-xs font-medium text-muted-foreground ring-1 ring-inset ring-border/40">
        {{ . }}
      </span>
      {{ end }}
    </div>
    <div class="flex gap-2 mt-2">
      {{ if .Params.github }}
      <a href="{{ .Params.github }}" target="_blank" rel="noopener noreferrer" aria-label="GitHub" class="text-muted-foreground hover:text-foreground transition-colors group/link p-1">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 group-hover/link:text-amber-400 transition-colors">
          <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4" />
          <path d="M9 18c-4.51 2-5-2-7-2" />
        </svg>
      </a>
      {{ end }}
      {{ if .Params.liveUrl }}
      <a href="{{ .Params.liveUrl }}" target="_blank" rel="noopener noreferrer" aria-label="Live site" class="text-muted-foreground hover:text-foreground transition-colors group/link p-1">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 group-hover/link:text-amber-400 transition-colors">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
          <polyline points="15 3 21 3 21 9" />
          <line x1="10" y1="14" x2="21" y2="3" />
        </svg>
      </a>
      {{ end }}
    </div>
  </div>
</div>

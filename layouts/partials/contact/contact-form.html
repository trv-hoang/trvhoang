<div class="border border-border/50 bg-card/30 backdrop-blur-sm p-8 sm:p-10 rounded-3xl shadow-xl">
  <form action="#" method="POST" class="space-y-6">
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
      <div>
        <label for="name" class="block text-sm font-medium text-muted-foreground mb-1.5">Your Name</label>
        <input
          type="text"
          id="name"
          name="name"
          placeholder="John Doe"
          class="w-full bg-muted/50 border border-border/60 rounded-xl px-4 py-2.5 text-sm text-foreground placeholder:text-muted-foreground/50 focus:outline-none focus:ring-2 focus:ring-amber-500/30 focus:border-amber-500/50 transition-all"
          required
        />
      </div>
      <div>
        <label for="email" class="block text-sm font-medium text-muted-foreground mb-1.5">Email Address</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="john@example.com"
          class="w-full bg-muted/50 border border-border/60 rounded-xl px-4 py-2.5 text-sm text-foreground placeholder:text-muted-foreground/50 focus:outline-none focus:ring-2 focus:ring-amber-500/30 focus:border-amber-500/50 transition-all"
          required
        />
      </div>
    </div>
    <div>
      <label for="subject" class="block text-sm font-medium text-muted-foreground mb-1.5">Subject</label>
      <input
        type="text"
        id="subject"
        name="subject"
        placeholder="What is this about?"
        class="w-full bg-muted/50 border border-border/60 rounded-xl px-4 py-2.5 text-sm text-foreground placeholder:text-muted-foreground/50 focus:outline-none focus:ring-2 focus:ring-amber-500/30 focus:border-amber-500/50 transition-all"
        required
      />
    </div>
    <div>
      <label for="message" class="block text-sm font-medium text-muted-foreground mb-1.5">Message</label>
      <textarea
        id="message"
        name="message"
        rows="5"
        placeholder="Tell me more about your project..."
        class="w-full bg-muted/50 border border-border/60 rounded-xl px-4 py-2.5 text-sm text-foreground placeholder:text-muted-foreground/50 focus:outline-none focus:ring-2 focus:ring-amber-500/30 focus:border-amber-500/50 transition-all resize-none"
        required
      ></textarea>
    </div>
    <div class="pt-4">
      <button
        type="submit"
        class="w-full px-6 py-3 rounded-xl bg-amber-500 text-black font-semibold text-sm hover:bg-amber-400 transition-all duration-200 flex items-center justify-center gap-3 group/btn"
      >
        <span>Send Message</span>
        <svg
          class="w-4 h-4 group-hover/btn:translate-x-1 transition-transform"
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </form>
</div>
